<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeToPng</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h2>VS Code Style => PNG (using Shiki)</h2>

  <div class="controls">
    <select id="lang">
      <option value="javascript">JavaScript</option>
      <option value="typescript">TypeScript</option>
      <option value="python">Python</option>
      <option value="java">Java</option>
    </select>
    <button id="convertBtn">Convert</button>
    <button id="downloadBtn" disabled>Download PNG</button>
  </div>

  <textarea id="input" placeholder="Paste your code here..."></textarea>
  <p>use Full-screen for wider png width</p>

  <div id="previewWrapper"></div>
  <img id="output" class="hidden" alt="Generated PNG preview" />

  <!-- html2canvas (load once) -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <!-- App logic (ESM for Shiki) -->
  <script type="module" src="script.js"></script>
</body>
</html>
